<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Low Tide Cafe</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="logo-wrap">
    <img src="images/Logo only.png" alt="Low Tide Cafe Logo" class="logo-icon">
    <img src="images/Name only.png" alt="Low Tide Cafe" class="logo-text">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Cakes</a>
    <a href="#">Coffee Beans</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Your Local Café on the Costa del Sol</h1>

    <p>
      Brunch, specialty coffee and homemade cakes
      in Fuengirola & Mijas Costa.
    </p>

    <div class="hero-buttons">
      <a href="#" class="btn-primary">View Menu</a>
      <a href="#" class="btn-secondary">Order a Cake</a>
    </div>
  </div>
</section>

<footer class="footer">

  <div class="footer-left">
        <img src="images/Logo only.png" alt="Low Tide Cafe Logo" class="logo-icon">
    <img src="images/white_logo.png" alt="Low Tide Cafe" class="footer-logo">

    <p class="footer-tagline">
      Your Local Café on the Costa del Sol
    </p>

    <p class="footer-copy">
      © 2026 Low Tide Cafe
    </p>
  </div>

  <div class="footer-right">
    <a href="#">Instagram</a>
    <a href="#">WhatsApp</a>
  </div>

</footer>

</body>
</html>
